<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Tailwind CSS CDN -->

    <!-- Google Fonts: Inter -->

    <!-- FontAwesome Icons for Beautiful Graphics -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            scroll-behavior: smooth;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* Custom subtle scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* Dark Mode Global Overrides - Pure Black */
        body.dark {
            background-color: #000000 !important;
            color: #f8fafc !important;
        }
        body.dark .bg-white { background-color: #121212 !important; border-color: #262626 !important; color: #f8fafc !important; }
        body.dark .text-slate-900, body.dark .text-slate-800 { color: #ffffff !important; }
        body.dark .text-slate-700 { color: #e2e8f0 !important; }
        body.dark .text-slate-600 { color: #cbd5e1 !important; }
        body.dark .text-slate-500 { color: #94a3b8 !important; }
        body.dark .bg-slate-50, body.dark .bg-slate-100 { background-color: #000000 !important; border-color: #262626 !important; }
        body.dark header { background-color: rgba(0, 0, 0, 0.9) !important; border-color: #262626 !important; }
        body.dark nav { background-color: rgba(0, 0, 0, 0.25) !important; border-color: rgba(255,255,255,0.08) !important; }
        body.dark .splash-overlay { background-color: #000000 !important; }

        /* Soft pulsing animation for live notifications */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
        .pulse-accent {
            animation: pulse-soft 2s infinite ease-in-out;
        }

        /* --- Splash Screen Animation Styles --- */
        
        /* 1. Logo Spins and Pops In (Spring bounce effect) */
        .animate-logo-enter {
            /* 1.5s duration, using a custom cubic-bezier for a "springy" stop */
            animation: popInSpin 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
 
        @keyframes popInSpin {
            0% { 
                transform: scale(0) rotate(-720deg); /* Starts small and rotated twice backward */
                opacity: 0; 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1; 
            }
        }
 
        /* 2. Continuous soft pulse on the inner icon */
        .animate-icon-pulse {
            animation: pulseSoft 2s infinite ease-in-out;
            animation-delay: 1.5s; /* Waits for the spin to finish before pulsing */
        }
 
        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
 
        /* 3. Text container expands and fades in, pushing the logo left seamlessly */
        .animate-text-expand {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap; /* Prevents text wrapping while expanding */
            /* Starts at 1.5s exactly when the logo finishes spinning */
            animation: expandReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 1.5s forwards;
        }
 
        @keyframes expandReveal {
            0% { 
                max-width: 0; 
                opacity: 0; 
                margin-left: 0; 
                transform: translateX(-20px); 
            }
            100% { 
                max-width: 600px; /* Expands to full width */
                opacity: 1; 
                margin-left: 1.5rem; /* Adds spacing between logo and text */
                transform: translateX(0); 
            }
        }

        /* Overlay smooth transitions */
        .splash-overlay {
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }
    </style>
</head>

        const { useState, useEffect, useMemo } = React;

        // Textile Hub Coordinates Database for Distance Calculations
        const INITIAL_HUBS = {
            "Surat": { lat: 21.1702, lon: 72.8311, state: "Gujarat" },
            "Ahmedabad": { lat: 23.0225, lon: 72.5714, state: "Gujarat" },
            "Mumbai": { lat: 19.0760, lon: 72.8777, state: "Maharashtra" },
            "Coimbatore": { lat: 11.0168, lon: 76.9558, state: "Tamil Nadu" },
            "Ludhiana": { lat: 30.9010, lon: 75.8573, state: "Punjab" },

        };

        // Standard Haversine Distance Calculator (km)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a =
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return parseFloat((R * c).toFixed(1));
        }

        // Mock Fabrics Database
        const INITIAL_FABRICS = [

            {

            {

                image: "bg-gradient-to-br from-slate-700 to-slate-900",

            },
            {
                id: 6,
                name: "Lycra Stretch Rib Knit",
                category: "Knit",
                basePrice: 175,
                transportRate: 0.14,
                location: "Ludhiana",
                seller: "Apex Knitwear Corp",
                sellerRating: 4.4,
                stock: 5000,
                description: "2x2 elastane rib-knit with superb stretch recovery. Breathable texture ideal for collars, cuffs, fitted tees, and sportswear accessories.",
                image: "bg-gradient-to-br from-emerald-800 to-teal-950",
                texturePattern: "vertical-stripes"
            },
            {
                id: 7,
                name: "Pure South Silk Kanchi Border",
                category: "Silk",
                basePrice: 680,
                transportRate: 0.30,
                location: "Coimbatore",
                seller: "Kaveri Handlooms",
                sellerRating: 4.9,
                stock: 600,
                description: "Authentic double-warp silk containing gorgeous gold thread accents. Handwoven following age-old heritage styles by national award weavers.",
                image: "bg-gradient-to-br from-purple-700 to-fuchsia-900",
                texturePattern: "grand-border"
            }
        ];

        // Sample initial simulated conversations
        const INITIAL_CHATS = [
            {
                id: 101,
                seller: "Ambika Textile Hub",
                productName: "Organic Pure Cotton Malmal",
                messages: [
                    { sender: "seller", text: "Hello! Thank you for showing interest in our Cotton Malmal. What volume are you looking to source?", time: "Yesterday" },
                    { sender: "buyer", text: "Hi, I need about 1500 meters delivered to my factory. Can we discuss wholesale discounts?", time: "Yesterday" },
                    { sender: "seller", text: "We can reduce the base price to ₹62/meter for orders above 1000 meters. Let me know!", time: "10:15 AM" }
                ]
            },
            {
                id: 102,
                seller: "Patel Cotton Mills",
                productName: "Premium Indigo Denim Twill 14oz",
                messages: [
                    { sender: "seller", text: "Our denim dispatch is ready for this Friday. Would you like a sample booklet shipped first?", time: "2 Days Ago" }
                ]
            }
        ];

        function App() {
            // Splash Animation States
            const [showIntro, setShowIntro] = useState(true);
            const [fadeOutIntro, setFadeOutIntro] = useState(false);
            const [introTriggerKey, setIntroTriggerKey] = useState(0); // For replaying animation

            // Main routing and databases state
            const [currentPage, setCurrentPage] = useState('marketplace');
            const [fabrics, setFabrics] = useState(INITIAL_FABRICS);
            const [chats, setChats] = useState(INITIAL_CHATS);
            const [activeChatId, setActiveChatId] = useState(null);
            
            // Dynamic State for Textile Hub Locations
            const [hubs, setHubs] = useState(INITIAL_HUBS);
            
            // Search & Filter state
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [sortBy, setSortBy] = useState('nearest'); // 'nearest', 'lowest-base', 'lowest-delivered', 'rating'
            
            // Auth State - starts empty (anonymous guest mode)
            const [user, setUser] = useState(null); 
            
            // Settings State
            const [theme, setTheme] = useState('light');
            const [manualLocation, setManualLocation] = useState('');
            const [detectedCoords, setDetectedCoords] = useState(null);

            const [loginModalOpen, setLoginModalOpen] = useState(false);
            const [loginMessage, setLoginMessage] = useState("");
            const [usernameInput, setUsernameInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authTab, setAuthTab] = useState('login'); // 'login' or 'signup'
            const [signupCity, setSignupCity] = useState('Surat');

            // Form inputs state for "Add Fabric"
            const [newProductName, setNewProductName] = useState("");
            const [newProductCat, setNewProductCat] = useState("Cotton");
            const [newProductPrice, setNewProductPrice] = useState("");
            const [newProductTransport, setNewProductTransport] = useState("");
            const [newProductDesc, setNewProductDesc] = useState("");

            // Location Add Form State
            const [newCityName, setNewCityName] = useState("");
            const [newCityState, setNewCityState] = useState("");
            const [newCityLat, setNewCityLat] = useState("");
            const [newCityLon, setNewCityLon] = useState("");

            // Action to execute immediately after logging in (e.g., open chat with seller)
            const [pendingAction, setPendingAction] = useState(null);

            // Toast/Alert state
            const [toast, setToast] = useState(null);

            // Auto-advance splash intro after 3.8s
            useEffect(() => {
                if (showIntro) {
                    const fadeTimer = setTimeout(() => {
                        setFadeOutIntro(true);
                        const hideTimer = setTimeout(() => {
                            setShowIntro(false);
                        }, 800); // Wait for transition fade duration
                        return () => clearTimeout(hideTimer);
                    }, 3800);
                    return () => clearTimeout(fadeTimer);
                }
            }, [showIntro, introTriggerKey]);

            // Manual Skip Splash Screen
            const skipIntro = () => {
                setFadeOutIntro(true);
                setTimeout(() => {
                    setShowIntro(false);
                }, 400);
            };

            // Replay Intro function
            const replayIntro = () => {
                setFadeOutIntro(false);
                setIntroTriggerKey(prev => prev + 1);
                setShowIntro(true);
            };

            const triggerToast = (msg, type = 'success') => {
                setToast({ text: msg, type });
                setTimeout(() => setToast(null), 4000);
            };

            // Calculate distance & pricing for all fabrics relative to user's location
            const processFabricListings = useMemo(() => {
                // If user is not logged in, we assume a default location (Surat) to calculate prices
                const userLat = user ? user.lat : hubs["Surat"].lat;
                const userLon = user ? user.lon : hubs["Surat"].lon;
                const userCity = user ? user.city : "Surat";

                return fabrics.map(fabric => {
                    const hubCoords = hubs[fabric.location] || hubs["Surat"];
                    const distance = calculateDistance(userLat, userLon, hubCoords.lat, hubCoords.lon);
                    
                    // Simple shipping model: distance * rate per km * per meter
                    const transportCost = parseFloat((distance * fabric.transportRate).toFixed(2));
                    const deliveredPrice = parseFloat((fabric.basePrice + transportCost).toFixed(2));

                    return {
                        ...fabric,
                        calculatedDistance: distance,
                        transportCost: transportCost,
                        deliveredPrice: deliveredPrice
                    };
                });
            }, [fabrics, user, hubs]);

            // Filter & Search & Sort engine
            const filteredFabrics = useMemo(() => {
                let results = [...processFabricListings];

                // Category Filter
                if (selectedCategory !== 'All') {
                    results = results.filter(f => f.category === selectedCategory);
                }

                // Search Bar Filter (Fabric Name, Category, or Seller Name)
                if (searchQuery.trim() !== '') {
                    const query = searchQuery.toLowerCase();
                    results = results.filter(f => 
                        f.name.toLowerCase().includes(query) ||
                        f.seller.toLowerCase().includes(query) ||
                        f.category.toLowerCase().includes(query) ||
                        f.location.toLowerCase().includes(query)
                    );
                }

                // Sorting mechanism
                if (sortBy === 'nearest') {
                    results.sort((a, b) => a.calculatedDistance - b.calculatedDistance);
                } else if (sortBy === 'lowest-base') {
                    results.sort((a, b) => a.basePrice - b.basePrice);
                } else if (sortBy === 'highest-base') {
                    results.sort((a, b) => b.basePrice - a.basePrice);
                } else if (sortBy === 'lowest-delivered') {
                    results.sort((a, b) => a.deliveredPrice - b.deliveredPrice);
                } else if (sortBy === 'highest-delivered') {
                    results.sort((a, b) => b.deliveredPrice - a.deliveredPrice);
                } else if (sortBy === 'rating') {
                    results.sort((a, b) => b.sellerRating - a.sellerRating);
                }

                return results;
            }, [processFabricListings, selectedCategory, searchQuery, sortBy]);

            // Handle switching user location (recalculations instantly!)
            const handleLocationChange = (cityName) => {
                if (!user) {
                    triggerToast("Please sign in first to set your active warehousing port.", "error");
                    setLoginMessage("Please sign in to lock in your shipping destination port.");
                    setLoginModalOpen(true);
                    return;
                }
                const coords = hubs[cityName];
                if (coords) {
                    setUser(prev => ({
                        ...prev,
                        city: cityName,
                        lat: coords.lat,
                        lon: coords.lon
                    }));
                    triggerToast(`Location updated to ${cityName}! Transport costs recalculated instantly.`, "success");
                }
            };

            // Location Adder Function
            const handleAddLocation = (e) => {
                e.preventDefault();
                if (!newCityName || !newCityState || !newCityLat || !newCityLon) {
                    triggerToast("Please fill all custom coordinate fields.", "error");
                    return;
                }

                const latNum = parseFloat(newCityLat);
                const lonNum = parseFloat(newCityLon);

                if (isNaN(latNum) || latNum < -90 || latNum > 90) {
                    triggerToast("Latitude must be a valid number between -90 and 90.", "error");
                    return;
                }
                if (isNaN(lonNum) || lonNum < -180 || lonNum > 180) {
                    triggerToast("Longitude must be a valid number between -180 and 180.", "error");
                    return;
                }

                const formattedName = newCityName.trim();

                setHubs(prev => ({
                    ...prev,
                    [formattedName]: {
                        lat: latNum,
                        lon: lonNum,
                        state: newCityState.trim()
                    }
                }));

                triggerToast(`"${formattedName}" successfully added as a trade hub port!`, "success");

                // Clear fields
                setNewCityName("");
                setNewCityState("");
                setNewCityLat("");
                setNewCityLon("");
            };

            // Fast Coordinate Presets Helper
            const applyPresetLocation = (name, state, lat, lon) => {
                setNewCityName(name);
                setNewCityState(state);
                setNewCityLat(lat.toString());
                setNewCityLon(lon.toString());
                triggerToast(`Preset loaded for ${name}! Submit to add.`, "info");
            };

            // Handle logging in
            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (!usernameInput) {
                    triggerToast("Please enter a valid business username", "error");
                    return;
                }

                const matchedCity = signupCity || "Surat";
                const coords = hubs[matchedCity] || hubs["Surat"];

                const mockUser = {
                    name: usernameInput,
                    business: `${usernameInput} Enterprises`,
                    city: matchedCity,
                    lat: coords.lat,
                    lon: coords.lon,
                    email: `${usernameInput.toLowerCase().replace(/\s+/g, '')}@texora.com`,
                    phone: "+91 99991 23456"
                };

                setUser(mockUser);
                setLoginModalOpen(false);
                setUsernameInput("");
                setPasswordInput("");
                
                triggerToast(`Welcome back, ${mockUser.name}! Your dynamic Texora hub is active.`, "success");

                if (pendingAction) {
                    setTimeout(() => {
                        if (pendingAction.type === 'navigate') {
                            setCurrentPage(pendingAction.page);
                        } else {
                            executeMessageSeller(pendingAction.seller, pendingAction.productName, mockUser);
                        }
                        setPendingAction(null);
                    }, 500);
                }
            };

            // Handle logging out
            const handleLogout = () => {
                setUser(null);
                triggerToast("Logged out successfully.", "info");
            };

            // Core Trigger: Message Seller Flow
            const handleMessageSellerTrigger = (sellerName, productName) => {
                if (!user) {
                    setPendingAction({ seller: sellerName, productName: productName });
                    setLoginMessage(`Please log in to contact ${sellerName} about this fabric.`);
                    setLoginModalOpen(true);
                } else {
                    executeMessageSeller(sellerName, productName, user);
                }
            };

            // Execute actual chat initiation
            const executeMessageSeller = (sellerName, productName, currentUser) => {
                const existingChat = chats.find(c => c.seller === sellerName && c.productName === productName);

                if (existingChat) {
                    setActiveChatId(existingChat.id);
                } else {
                    const newChatId = Date.now();
                    const welcomeMsg = `Hi ${sellerName}, I am interested in your listing '${productName}'. I am sourcing from ${currentUser.city}. Could you share logistics rates and ready stock availability?`;
                    
                    const newChat = {
                        id: newChatId,
                        seller: sellerName,
                        productName: productName,
                        messages: [
                            { sender: "buyer", text: welcomeMsg, time: "Just Now" }
                        ]
                    };

                    setChats([newChat, ...chats]);
                    setActiveChatId(newChatId);

                    // Auto-reply simulation
                    setTimeout(() => {
                        setChats(prevChats => 
                            prevChats.map(c => {
                                if (c.id === newChatId) {
                                    return {
                                        ...c,
                                        messages: [
                                            ...c.messages,
                                            { 
                                                sender: "seller", 
                                                text: `Hello ${currentUser.name}! Thank you for reaching out to us on Texora. Yes, we have ready stock in our warehouse. Since you are in ${currentUser.city}, we can package and dispatch via our regular transport lines within 24 hours. How many meters do you require?`, 
                                                time: "Just Now" 
                                            }
                                        ]
                                    };
                                }
                                return c;
                            })
                        );
                        triggerToast(`New message from ${sellerName}!`, "info");
                    }, 2000);
                }

                setCurrentPage('chat');
                triggerToast(`Opened chat with ${sellerName}`, "success");
            };

            // Handle sending custom chat message
            const handleSendChatMessage = (chatId, text) => {
                if (!text.trim()) return;

                setChats(prev => prev.map(c => {
                    if (c.id === chatId) {
                        return {
                            ...c,
                            messages: [...c.messages, { sender: "buyer", text: text, time: "Just Now" }]
                        };
                    }
                    return c;
                }));

                // Simulate smart AI auto-replies matching the item context
                setTimeout(() => {
                    setChats(prev => prev.map(c => {
                        if (c.id === chatId) {
                            return {
                                ...c,
                                messages: [...c.messages, { 
                                    sender: "seller", 
                                    text: `Perfect. Let me check the exact transportation slab for your cargo. If we load tomorrow, you'll receive the physical fabric invoice directly in your Texora dashboard.`, 
                                    time: "Just Now" 
                                }]
                            };
                        }
                        return c;
                    }));
                }, 2500);
            };

            const handleCreateProduct = (e) => {
                e.preventDefault();
                if (!user) {
                    triggerToast("Log in required to post fabric listings.", "error");
                    return;
                }
                if (!newProductName || !newProductPrice || !newProductTransport) {
                    triggerToast("Please fill all required parameters.", "error");
                    return;
                }

                const newFabricObj = {
                    id: Date.now(),
                    name: newProductName,
                    category: newProductCat,
                    basePrice: parseFloat(newProductPrice),
                    transportRate: parseFloat(newProductTransport),
                    location: user.city,
                    seller: user.business,
                    sellerRating: 5.0,
                    stock: 2500,
                    description: newProductDesc || "Premium quality woven textiles certified for high-volume exports and industrial tailoring.",
                    image: "bg-gradient-to-br from-indigo-700 to-slate-900",
                    texturePattern: "geometric-grid"
                };

                setFabrics([newFabricObj, ...fabrics]);
                triggerToast(`Fabric "${newProductName}" successfully listed in Texora Marketplace!`, "success");
                
                // Clear input fields
                setNewProductName("");
                setNewProductPrice("");
                setNewProductTransport("");
                setNewProductDesc("");
                
                // Jump back to marketplace to view it
                setCurrentPage('marketplace');
            };

            const handleDeleteProduct = (productId) => {
                setFabrics(prev => prev.filter(f => f.id !== productId));
                triggerToast("Product removed from marketplace successfully.", "info");
            };

            // Toggle Theme function
            const handleThemeChange = (newTheme) => {
                setTheme(newTheme);
                if (newTheme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            };

                                setManualLocation(placeName);
                                triggerToast(`Location identified: ${placeName}`, "success");

                                const coordString = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                                setManualLocation(coordString);
                                triggerToast(`Location identified: ${coordString}`, "success");
                            }
                        },
                        (error) => {

                        }

                }

                                                    <span>Light</span>
                                                </div>
                                                
                                                {/* Dark Label */}
                                                <div class={`relative z-10 flex-1 flex items-center justify-center gap-1.5 text-xs font-extrabold transition-all duration-500 ${theme === 'dark' ? 'text-white drop-shadow-sm' : 'text-slate-400/70 hover:text-slate-400'}`}>
                                                    <i class={`fa-solid fa-moon transition-all duration-500 ${theme === 'dark' ? 'rotate-0 scale-110' : 'rotate-90 scale-75 opacity-50'}`}></i> 
                                                    <span>Dark</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Geographic Profile Targeting */}
                                    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                                        <h3 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Geographic Location</h3>
                                        <p class="text-[11px] text-slate-500 mb-4 leading-relaxed">Map your device's physical coordinates to auto-configure localized shipping estimates in the marketplace.</p>

                                        <div class="space-y-4">
                                            {/* GPS Locator */}
                                            <button
                                                onClick={handleGPSLocation}
                                                class="w-full bg-violet-50 text-violet-700 hover:bg-violet-100 font-bold text-xs py-3 rounded-xl transition-all flex items-center justify-center space-x-2 border border-violet-200 shadow-sm"
                                            >
                                                <i class="fa-solid fa-location-crosshairs"></i>
                                                <span>Acquire GPS Position</span>
                                            </button>

                                            <div class="flex items-center text-[10px] text-slate-400 uppercase font-bold my-2">
                                                <span class="flex-grow border-t border-slate-200"></span>
                                                <span class="px-3">OR ENTER MANUALLY</span>
                                                <span class="flex-grow border-t border-slate-200"></span>
                                            </div>

                                            {/* Manual Entry */}
                                            <div>
                                                <div class="flex gap-2">
                                                    <input
                                                        type="text"
                                                        placeholder="Enter city or coordinates..."
                                                        value={manualLocation}
                                                        onChange={(e) => {
                                                            setManualLocation(e.target.value);
                                                            setDetectedCoords(null);
                                                        }}
                                                        class="flex-grow text-xs font-medium p-3 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-violet-500 rounded-xl outline-none"
                                                    />
                                                    <button
                                                        onClick={handleSaveManualLocation}
                                                        class="bg-violet-600 hover:bg-violet-700 text-white px-5 rounded-xl font-bold text-xs transition-colors shadow-md shadow-indigo-100"
                                                    >
                                                        Save
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Formally the "About" Page - Now integrated as a subsection inside Settings */}
                                <div class="mt-8 pt-8 border-t border-slate-200 space-y-8">
                                    <h3 class="text-lg font-black text-slate-800 text-center mb-6">About Texora</h3>
                                    
                                    {/* Hero Introduction */}
                                    <div class="bg-gradient-to-br from-violet-900 via-slate-900 to-indigo-950 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                                        <div class="relative z-10 max-w-xl">
                                            <span class="text-[10px] font-bold tracking-widest text-violet-300 uppercase bg-violet-500/20 px-3 py-1 rounded-full">
                                                Open-source Logistics Exchange
                                            </span>
                                            <h2 class="text-2xl font-black mt-3 leading-tight">Texora Fabric Exchange</h2>
                                            <p class="text-sm text-violet-200 mt-2 leading-relaxed">
                                                The leading open-source textile exchange enabling dynamic wholesale trading, distance verification, and direct-to-loom negotiations for Indian manufacturers.
                                            </p>
                                        </div>
                                        <div class="absolute right-0 bottom-0 translate-x-20 translate-y-20 w-80 h-80 bg-violet-500/10 rounded-full blur-2xl"></div>
                                    </div>

                                    {/* Mathematical Costing Model Explanation */}
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                                            <h3 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <i class="fa-solid fa-calculator text-violet-500"></i>
                                                <span>Dynamic Landed Cost Equation</span>
                                            </h3>
                                            <p class="text-xs text-slate-500 leading-relaxed mb-4">
                                                Our smart logistics layer automatically factors in truck transport freights from the production loom direct to your warehouse. By processing the Earth's radius, we prevent misleading ex-factory rates from masking heavy transport cost overlays.
                                            </p>
                                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <p class="text-xs text-slate-400 font-bold mb-1">THE SYSTEM FORMULA</p>
                                                <p class="text-sm font-black text-violet-600 font-mono">
                                                    Landed Price = Ex-Factory Rate + (Distance in km &times; Surcharge per meter)
                                                </p>
                                            </div>
                                        </div>

                                        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                                            <h3 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <i class="fa-solid fa-circle-check text-emerald-500"></i>
                                                <span>Platform Trading Guidelines</span>
                                            </h3>
                                            <ul class="space-y-3.5 text-xs text-slate-600">
                                                <li class="flex items-start gap-2">
                                                    <span class="bg-emerald-50 text-emerald-600 w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold text-[10px]">1</span>
                                                    <span>Add and verify custom location coordinates in the <strong>Account</strong> page to optimize geographic sorting.</span>
                                                </li>
                                                <li class="flex items-start gap-2">
                                                    <span class="bg-emerald-50 text-emerald-600 w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold text-[10px]">2</span>
                                                    <span>Initiate discussions via "Message Seller" to discuss volume tier rebates (typically over 1,000 meters).</span>
                                                </li>
                                                <li class="flex items-start gap-2">
                                                    <span class="bg-emerald-50 text-emerald-600 w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold text-[10px]">3</span>
                                                    <span>Post deadstock surplus materials easily to avoid factory warehousing storage over-expenditures.</span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>

                                    {/* Platform Makers Info */}
                                    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm text-center">
                                        
                                        <h3 class="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">Designed and Maintained By</h3>
                                        <p class="text-xs text-slate-500 max-w-md mx-auto">
                                            This platform was designed and developed as a collaborative project by a
                                            passionate team of developers dedicated to modernizing textile trade through
                                            innovative technology. Our goal is to provide a seamless, secure, and
                                            efficient marketplace that connects manufacturers and traders.
                                            
                                            <br/><br/>
                                            <strong class="text-slate-700">Development Team</strong><br/>
                                            Tank Prince &bull; Chauhan Divyesh &bull; Khara Gautam &bull; Shingrakhiya Dax

                                        </p>
                                        <div class="flex items-center justify-center gap-4 mt-6 text-slate-400 text-[10px] font-bold uppercase tracking-wider">
                                            <span>Surat Headquarters</span>
                                            <span>&bull;</span>
                                            <span>2026 Textile Tech Guild</span>
                                            <span>&bull;</span>
                                            <span>Sourcing Network</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* FLOATING NAVIGATION BAR DOCKED AT THE BOTTOM */}
                    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[95%] max-w-lg bg-white/20 backdrop-blur-xl rounded-2xl border border-white/30 shadow-2xl px-3 py-2 flex items-center justify-around ring-1 ring-white/10 transition-colors">
                        
                        {/* Navigation Tab: Marketplace */}
                        <button 
                            onClick={() => setCurrentPage('marketplace')}
                            class={`flex flex-col items-center gap-1.5 py-1 px-3.5 rounded-xl transition-all ${
                                currentPage === 'marketplace' 
                                ? 'text-violet-700 bg-white/40 scale-105 shadow-sm font-bold' 
                                : 'text-slate-700 hover:text-slate-950 font-semibold'
                            }`}
                        >
                            <i class="fa-solid fa-store text-lg"></i>
                            <span class="text-[9px]">Marketplace</span>
                        </button>

                        {/* Navigation Tab: My Product */}
                        <button 
                            onClick={() => setCurrentPage('my-products')}
                            class={`flex flex-col items-center gap-1.5 py-1 px-3.5 rounded-xl transition-all ${
                                currentPage === 'my-products' 
                                ? 'text-violet-700 bg-white/40 scale-105 shadow-sm font-bold' 
                                : 'text-slate-700 hover:text-slate-950 font-semibold'
                            }`}
                        >
                            <i class="fa-solid fa-cubes text-lg"></i>
                            <span class="text-[9px]">My Product</span>
                        </button>

                        {/* Navigation Tab: Chat */}
                        <button 
                            onClick={() => {
                                if (!user) {
                                    setPendingAction({ type: 'navigate', page: 'chat' });
                                    setLoginMessage("Please sign in to access your secure chat negotiation channels.");
                                    setLoginModalOpen(true);
                                } else {
                                    setCurrentPage('chat');
                                }
                            }}
                            class={`flex flex-col items-center gap-1.5 py-1 px-3.5 rounded-xl transition-all relative ${
                                currentPage === 'chat' 
                                ? 'text-violet-700 bg-white/40 scale-105 shadow-sm font-bold' 
                                : 'text-slate-700 hover:text-slate-950 font-semibold'
                            }`}
                        >
                            <i class="fa-solid fa-comments text-lg"></i>
                            <span class="text-[9px]">Chat</span>
                            {user && (
                                <span class="absolute top-1.5 right-4 w-2 h-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
                            )}
                        </button>

                        {/* Navigation Tab: Account */}
                        <button 
                            onClick={() => setCurrentPage('account')}
                            class={`flex flex-col items-center gap-1.5 py-1 px-3.5 rounded-xl transition-all ${
                                currentPage === 'account' 
                                ? 'text-violet-700 bg-white/40 scale-105 shadow-sm font-bold' 
                                : 'text-slate-700 hover:text-slate-950 font-semibold'
                            }`}
                        >
                            <i class="fa-solid fa-sliders text-lg"></i>
                            <span class="text-[9px]">Account</span>
                        </button>

                        {/* Navigation Tab: Settings (Replaced About) */}
                        <button 
                            onClick={() => setCurrentPage('settings')}
                            class={`flex flex-col items-center gap-1.5 py-1 px-3.5 rounded-xl transition-all ${
                                currentPage === 'settings' 
                                ? 'text-violet-700 bg-white/40 scale-105 shadow-sm font-bold' 
                                : 'text-slate-700 hover:text-slate-950 font-semibold'
                            }`}
                        >
                            <i class="fa-solid fa-gear text-lg"></i>
                            <span class="text-[9px]">Settings</span>
                        </button>

                    </nav>

                    {/* DYNAMIC MODAL: LOGIN / SIGNUP POPUP */}
                    {loginModalOpen && (
                        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all animate-fade-in">
                            <div class="bg-white w-full max-w-md rounded-3xl border border-slate-100 shadow-2xl p-6 relative overflow-hidden">
                                
                                {/* Close button */}
                                <button 
                                    onClick={() => { setLoginModalOpen(false); setPendingAction(null); }}
                                    class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 p-2"
                                >
                                    <i class="fa-solid fa-xmark text-lg"></i>
                                </button>

                                {/* Icon banner */}
                                <div class="flex items-center gap-3.5 pb-4 mb-4 border-b border-slate-100">
                                    <div class="w-10 h-10 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center">
                                        <i class="fa-solid fa-lock"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-xs font-bold uppercase text-slate-400 tracking-widest">Authentication Hub</h3>
                                        <h2 class="text-sm font-extrabold text-slate-800">Texora Trader Access</h2>
                                    </div>
                                </div>

                                {/* Custom prompt action messages */}
                                {loginMessage && (
                                    <div class="mb-4 p-3 bg-amber-50 text-amber-700 rounded-xl text-xs font-semibold flex items-center gap-2 border border-amber-100">
                                        <i class="fa-solid fa-circle-exclamation text-xs"></i>
                                        <span>{loginMessage}</span>
                                    </div>
                                )}

                                {/* Authentication choice tabs */}
                                <div class="grid grid-cols-2 gap-2 mb-6">
                                    <button
                                        type="button"
                                        onClick={() => setAuthTab('login')}
                                        class={`py-2 rounded-xl text-xs font-bold transition-all ${authTab === 'login' ? 'bg-violet-600 text-white' : 'bg-slate-50 text-slate-500'}`}
                                    >
                                        Log In
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setAuthTab('signup')}
                                        class={`py-2 rounded-xl text-xs font-bold transition-all ${authTab === 'signup' ? 'bg-violet-600 text-white' : 'bg-slate-50 text-slate-500'}`}
                                    >
                                        Register Mill
                                    </button>
                                </div>

                                {/* Submit Form */}
                                <form onSubmit={handleLoginSubmit} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">
                                            {authTab === 'login' ? 'Username or Email' : 'Business Owner Name *'}
                                        </label>
                                        <input
                                            type="text"
                                            placeholder="e.g. Rahul Patel"
                                            class="w-full text-xs font-medium p-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-violet-500 rounded-lg outline-none"
                                            value={usernameInput}
                                            onChange={(e) => setUsernameInput(e.target.value)}
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Secure Password *</label>
                                        <input
                                            type="password"
                                            placeholder="••••••••"
                                            class="w-full text-xs font-medium p-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-violet-500 rounded-lg outline-none"
                                            value={passwordInput}
                                            onChange={(e) => setPasswordInput(e.target.value)}
                                            required
                                        />
                                    </div>

                                    {/* Additional fields for signing up */}
                                    {authTab === 'signup' && (
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Sourcing Hub City *</label>
                                            <select
                                                class="w-full text-xs font-medium p-2.5 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer animate-fade-in"
                                                value={signupCity}
                                                onChange={(e) => setSignupCity(e.target.value)}
                                            >
                                                {Object.keys(hubs).map(c => (
                                                    <option key={c} value={c}>{c}</option>
                                                ))}
                                            </select>
                                            <p class="text-[9px] text-slate-400 mt-1">This defines your coordinate origin for logistics calculation lines.</p>
                                        </div>
                                    )}

                                    {/* Action Footers */}
                                    <div class="pt-4 flex items-center justify-between border-t border-slate-100">
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setUsernameInput("Kunal Sharma");
                                                setSignupCity("Surat");
                                                triggerToast("Loaded mock credential details!", "info");
                                            }}
                                            class="text-[10px] font-bold text-violet-600 hover:underline"
                                        >
                                            Autofill Credentials
                                        </button>
                                        <button
                                            type="submit"
                                            class="bg-violet-600 hover:bg-violet-700 text-white font-bold text-xs py-2 px-5 rounded-xl shadow-md transition-all"
                                        >
                                            {authTab === 'login' ? 'Confirm Sign In' : 'Generate Profile'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render React Application
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
